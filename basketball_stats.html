<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basketball Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:       #C8102E;
  --red-dark:  #9B0C22;
  --red-glow:  rgba(200,16,46,.25);
  --navy:      #1D428A;
  --navy-light:#253a6e;
  --blue:      #3D8EF8;
  --bg:        #0d0f14;
  --bg2:       #13161f;
  --bg3:       #191d28;
  --bg4:       #1e2330;
  --line:      rgba(255,255,255,.07);
  --line2:     rgba(255,255,255,.13);
  --txt:       #f0f2f8;
  --txt2:      #8a91a8;
  --txt3:      #4a5270;
  --white:     #ffffff;
  --gold:      #FDB927;
  --green:     #17c964;
  --amber:     #f5a524;
  --sans:      'Barlow', sans-serif;
  --cond:      'Barlow Condensed', sans-serif;
  --radius:    4px;
  --radius-md: 6px;
  --radius-lg: 10px;
}

body.light {
  --bg:    #f0f2f7;
  --bg2:   #ffffff;
  --bg3:   #f5f7fc;
  --bg4:   #eaecf4;
  --line:  rgba(0,0,0,.08);
  --line2: rgba(0,0,0,.15);
  --txt:   #1a2340;
  --txt2:  #5a6a8a;
  --txt3:  #9aaac8;
  --gold:  #d4920a;
  --green: #0ea853;
  --white: #636363;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 3px; }

html { font-size: 14px; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
  transition: background .2s, color .2s;
}

.theme-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5px;
  text-transform: uppercase;
  background: var(--bg3);
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  color: var(--txt2);
  cursor: pointer;
  transition: all .15s;
}
.theme-btn:hover { border-color: var(--txt2); color: var(--txt); }
.theme-btn i { font-size: 14px; }

/* ── Header ── */
.site-header {
  background: var(--bg);
  border-bottom: 2px solid var(--red);
  position: sticky;
  top: 0;
  z-index: 300;
}
.header-top {
  display: flex;
  align-items: center;
  padding: 0 28px;
  height: 56px;
  gap: 20px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--red);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-family: var(--cond);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--white);
  line-height: 1;
}
.logo-text span { color: var(--red); }

.header-divider { width: 1px; height: 24px; background: var(--line2); flex-shrink: 0; }

.scoreboard {
  display: flex;
  align-items: center;
  gap: 6px;
}
.score-label {
  font-family: var(--cond);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--txt3);
  flex-shrink: 0;
}
.score-box {
  display: flex;
  align-items: center;
  background: var(--bg3);
  border: 1px solid var(--line2);
  border-radius: var(--radius-md);
  overflow: hidden;
  flex-shrink: 0;
}
.score-team {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
}
.score-name-input {
  width: 70px;
  background: transparent;
  border: none;
  color: var(--txt2);
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: center;
  outline: none;
  padding: 0;
}
.score-name-input::placeholder { color: var(--txt3); }
.score-name-input:focus { color: var(--gold); }
.score-sep { width: 1px; height: 36px; background: var(--line2); flex-shrink: 0; }
.score-val-input {
  width: 44px;
  background: transparent;
  border: none;
  color: var(--white);
  font-family: var(--cond);
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  outline: none;
  padding: 0;
}
.score-val-input:focus { color: var(--gold); }
.score-dash {
  padding: 0 6px;
  font-family: var(--cond);
  font-size: 18px;
  font-weight: 700;
  color: var(--txt3);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  flex-shrink: 0;
}
.save-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .5px;
  color: var(--txt3);
  text-transform: uppercase;
  transition: color .2s;
}
.save-pill.saved { color: var(--green); }
.save-pill i { font-size: 13px; }

/* ── Nav bar ── */
.nav-bar {
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 2px;
  background: var(--bg2);
  border-top: 1px solid var(--line);
}
.nav-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 20px;
  font-family: var(--cond);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--txt3);
  background: none;
  border: none;
  cursor: pointer;
  position: relative;
  transition: color .15s;
}
.nav-tab::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--red);
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transition: transform .15s;
}
.nav-tab.active { color: var(--white); }
.nav-tab.active::after { transform: scaleX(1); }
.nav-tab:hover:not(.active) { color: var(--txt); }

/* ── Layout ── */
.main { max-width: 1080px; margin: 0 auto; padding: 28px 20px 60px; }

/* ── Game info strip ── */
.game-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 24px;
}
.info-cell {
  background: var(--bg2);
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.info-cell-label {
  font-family: var(--cond);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--txt3);
}
.info-cell input {
  background: transparent;
  border: none;
  color: var(--txt);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  padding: 0;
  width: 100%;
  outline: none;
  transition: color .15s;
}
.info-cell input:focus { color: var(--gold); }
.info-cell input::placeholder { color: var(--txt3); font-weight: 400; }
.info-cell input[type="date"] { color-scheme: dark; }
body.light .info-cell input[type="date"] { color-scheme: light; }

/* ── Section header ── */
.section-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.section-title {
  font-family: var(--cond);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--txt2);
}
.section-line { flex: 1; height: 1px; background: var(--line); }

/* ── Box score table ── */
.table-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 24px;
}
.table-wrap { overflow-x: auto; }
.table-wrap::-webkit-scrollbar { height: 4px; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  table-layout: fixed;
  min-width: 860px;
}
thead tr { background: var(--bg3); }
th {
  padding: 10px 8px;
  font-family: var(--cond);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--txt3);
  border-bottom: 1px solid var(--line);
  text-align: center;
  white-space: nowrap;
  position: sticky;
  top: 0;
  background: var(--bg3);
  z-index: 1;
}
th.th-num  { width: 48px; }
th.th-name { width: 180px; text-align: left; padding-left: 18px; }
th.th-foul { width: 130px; }
th.th-stat { width: 72px; }
th.th-pts  { width: 90px; color: var(--txt2); }
th.th-del  { width: 36px; }
th.th-shot { color: var(--blue) !important; }

td {
  padding: 7px 8px;
  text-align: center;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  transition: background .08s;
}
td.td-name {
  text-align: left;
  padding-left: 18px;
  font-weight: 500;
}
tr:last-child td { border-bottom: none; }
tr:hover:not(.row-foul5):not(.row-foul4):not(.row-add) td {
  background: rgba(255,255,255,.03);
}
tr.row-foul5 td { background: rgba(200,16,46,.1) !important; }
tr.row-foul5 .player-name-text { color: var(--red); }
tr.row-foul4 td { background: rgba(245,165,36,.08) !important; }

/* jersey number */
.num-input {
  width: 36px; height: 28px;
  background: var(--bg3);
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  color: var(--txt);
  font-family: var(--cond);
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: border-color .15s;
}
.num-input:focus { border-color: var(--red); color: var(--gold); }

/* player name */
.name-input {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius);
  color: var(--txt);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  padding: 2px 5px;
  outline: none;
}
.name-input:hover { border-color: var(--line2); background: var(--bg3); }
.name-input:focus { border-color: var(--red); background: var(--bg3); }

/* elim tag */
.elim-tag {
  display: inline-block;
  font-family: var(--cond);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--red);
  background: rgba(200,16,46,.15);
  border: 1px solid rgba(200,16,46,.3);
  border-radius: 3px;
  padding: 1px 5px;
  margin-left: 6px;
  vertical-align: middle;
}

/* foul dots */
.faltas-row { display: flex; gap: 4px; justify-content: center; align-items: center; }
.falta-btn {
  width: 21px; height: 21px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.15);
  background: var(--bg3);
  cursor: pointer;
  font-family: var(--cond);
  font-size: 10px;
  font-weight: 700;
  color: var(--txt3);
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
}
.falta-btn:hover { border-color: var(--txt2); color: var(--txt); }
.falta-btn.f-active { background: var(--red); border-color: var(--red); color: #fff; }
.falta-btn.f-warn   { background: var(--amber); border-color: var(--amber); color: #000; }

/* stat counter — FIX #4: touch-action: manipulation evita zoom en doble tap móvil */
.counter { display: flex; justify-content: center; }
.cnt-val {
  font-family: var(--cond);
  font-size: 16px;
  font-weight: 700;
  min-width: 36px;
  padding: 3px 6px;
  text-align: center;
  color: var(--txt);
  cursor: pointer;
  border-radius: var(--radius);
  user-select: none;
  touch-action: manipulation;   /* FIX #4 */
  transition: background .1s, color .1s, transform .08s;
}
.cnt-val:hover { background: rgba(255,255,255,.07); }
.cnt-val:active { transform: scale(.9); }
.cnt-val.pts-accent { color: var(--gold); font-size: 18px; font-weight: 800; }
.cnt-val.pts-readonly { cursor: default; }
.cnt-val.pts-readonly:hover { background: transparent; }
/* FIX #1/#3: ahora var(--blue) existe, estos estilos funcionan */
.cnt-val.cnt-shot { color: var(--blue); }
.cnt-val.cnt-shot:hover { background: rgba(61,142,248,.15); }
.cnt-val.cnt-att { color: var(--txt3); font-size: 13px; font-weight: 600; min-width: 22px; }
.cnt-val.cnt-att:hover { background: rgba(255,255,255,.06); color: var(--txt2); }
.shot-sep { font-family: var(--cond); font-size: 13px; color: var(--txt3); padding: 0 1px; user-select: none; }

.cnt-val.flash-inc { animation: flashInc .2s ease; }
.cnt-val.flash-dec { animation: flashDec .2s ease; }
@keyframes flashInc {
  0%   { background: rgba(200,16,46,.0);  transform: scale(1);    }
  40%  { background: rgba(200,16,46,.25); transform: scale(1.25); }
  100% { background: rgba(200,16,46,.0);  transform: scale(1);    }
}
@keyframes flashDec {
  0%   { background: rgba(255,255,255,.0);  transform: scale(1);  }
  40%  { background: rgba(255,255,255,.12); transform: scale(.8); }
  100% { background: rgba(255,255,255,.0);  transform: scale(1);  }
}

/* del */
.del-btn {
  width: 24px; height: 24px;
  border: none; background: none;
  cursor: pointer;
  color: var(--txt3);
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius);
  font-size: 13px;
  transition: all .15s;
}
.del-btn:hover { background: rgba(200,16,46,.15); color: var(--red); }

/* add row */
.row-add td { border-bottom: none; background: transparent !important; }
.add-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--cond);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--txt3);
  background: none;
  border: 1px dashed var(--line2);
  cursor: pointer;
  padding: 7px 14px;
  border-radius: var(--radius);
  margin: 8px 18px;
  transition: all .15s;
}
.add-btn:hover { color: var(--red); border-color: var(--red); background: rgba(200,16,46,.08); }

/* ── KPI cards ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 16px 14px 12px;
  position: relative;
  overflow: hidden;
  text-align: center;
  transition: transform .15s, border-color .15s;
  cursor: default;
}
.kpi-card:hover { transform: translateY(-2px); border-color: var(--line2); }
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.kpi-card.k-red::before    { background: var(--red); }
.kpi-card.k-navy::before   { background: var(--navy); }
.kpi-card.k-gold::before   { background: var(--gold); }
.kpi-card.k-green::before  { background: var(--green); }
.kpi-card.k-amber::before  { background: var(--amber); }
.kpi-label {
  font-family: var(--cond);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--txt3);
  margin-bottom: 8px;
}
.kpi-value {
  font-family: var(--cond);
  font-size: 36px;
  font-weight: 900;
  color: var(--white);
  line-height: 1;
}

/* ── Leaders ── */
.cat-block { margin-bottom: 28px; }
.cat-head {
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--txt3);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 12px;
}
.lider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
}
.lider-row:last-child { border-bottom: none; }
.lider-rank {
  font-family: var(--cond);
  font-size: 13px;
  font-weight: 800;
  color: var(--txt3);
  width: 18px;
  text-align: right;
  flex-shrink: 0;
}
.lider-rank.top { color: var(--gold); }
.lider-name { font-size: 14px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lider-bar-wrap { flex: 2; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.lider-bar { height: 100%; border-radius: 2px; background: var(--red); transition: width .5s cubic-bezier(.4,0,.2,1); }
.lider-bar.top { background: var(--gold); }
.lider-val {
  font-family: var(--cond);
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  min-width: 36px;
  text-align: right;
}

/* ── Per-player summary ── */
.summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.summary-table th {
  padding: 9px 8px;
  font-family: var(--cond);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--txt3);
  border-bottom: 1px solid var(--line);
  text-align: center;
  position: static;
  background: var(--bg3);
}
.summary-table th:first-child { text-align: left; padding-left: 18px; }
.summary-table td {
  padding: 8px 8px;
  text-align: center;
  border-bottom: 1px solid var(--line);
  font-family: var(--cond);
  font-size: 14px;
  font-weight: 600;
  color: var(--txt2);
}
.summary-table td:first-child { text-align: left; padding-left: 18px; font-family: var(--sans); font-size: 14px; color: var(--txt); }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table tr:hover td { background: rgba(255,255,255,.03); }
.td-pts-s { color: var(--gold) !important; font-size: 16px !important; font-weight: 800 !important; }
.td-red   { color: var(--red)   !important; font-weight: 800 !important; }
.td-amber { color: var(--amber) !important; font-weight: 800 !important; }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  padding-top: 24px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  font-family: var(--cond);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s;
  border: 1px solid var(--line2);
  background: var(--bg3);
  color: var(--txt2);
}
.btn:hover { border-color: var(--white); color: var(--white); }
.btn i { font-size: 15px; }
.btn-danger:hover { border-color: var(--red); color: var(--red); background: rgba(200,16,46,.1); }

/* ── Misc ── */
.empty-msg {
  font-family: var(--cond);
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--txt3);
  text-align: center;
  padding: 36px 0;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.game-info  { animation: fadeUp .3s ease both; }
.table-card { animation: fadeUp .3s .08s ease both; }
.kpi-row    { animation: fadeUp .3s .08s ease both; }
.cat-block  { animation: fadeUp .3s .1s ease both; }


</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-ball-basketball" style="color:#fff;font-size:20px"></i></div>
      <div class="logo-text">BBALL<span>STATS</span></div>
    </div>

    <div class="header-actions">
      <div class="save-pill" id="save-indicator">
        <i class="ti ti-device-floppy"></i>
        <span id="save-text">Sin guardar</span>
      </div>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">
        <i class="ti ti-sun" id="theme-icon"></i>
        <span id="theme-label">Claro</span>
      </button>
    </div>
  </div>

  <nav class="nav-bar">
    <button class="nav-tab active" onclick="showTab('registro')"><i class="ti ti-clipboard-list"></i>Box Score</button>
    <button class="nav-tab" onclick="showTab('resumen')"><i class="ti ti-chart-bar"></i>Team Stats</button>
    <button class="nav-tab" onclick="showTab('lideres')"><i class="ti ti-trophy"></i>Leaders</button>
  </nav>
</header>

<main class="main">

  <div class="game-info">
    <div class="info-cell">
      <div class="info-cell-label">Fecha</div>
      <input id="meta-fecha" type="date" oninput="saveMeta()">
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Lugar</div>
      <input id="meta-lugar" placeholder="Cancha / sede" type="text" oninput="saveMeta()" >
    </div>
  </div>

  <div id="tab-registro">
    <div class="section-head">
      <span class="section-title">Box Score</span>
      <div class="section-line"></div>
    </div>
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="th-num">#</th>
              <th class="th-name">Jugador</th>
              <th class="th-foul">Faltas</th>
              <th class="th-stat">REB</th>
              <th class="th-stat">AST</th>
              <th class="th-stat">BLK</th>
              <th class="th-stat">STL</th>
              <th class="th-stat">TO</th>
              <th class="th-stat th-shot">1PT</th>
              <th class="th-stat th-shot">2PT</th>
              <th class="th-pts">PTS</th>
              <th class="th-del"></th>
            </tr>
          </thead>
          <tbody id="players-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-resumen" style="display:none">
    <div class="section-head">
      <span class="section-title">Team Stats</span>
      <div class="section-line"></div>
    </div>
    <div class="kpi-row" id="kpi-row"></div>
    <div class="section-head">
      <span class="section-title">Player Stats</span>
      <div class="section-line"></div>
    </div>
    <div class="table-card">
      <div id="per-player-wrap"></div>
    </div>
  </div>

  <div id="tab-lideres" style="display:none">
    <div class="section-head">
      <span class="section-title">Statistical Leaders</span>
      <div class="section-line"></div>
    </div>
    <div id="lideres-wrap"></div>
  </div>

  <div class="toolbar">
    <button class="btn" onclick="exportJSON()"><i class="ti ti-download"></i>Exportar JSON</button>
    <label class="btn" style="cursor:pointer">
      <i class="ti ti-upload"></i>Importar JSON
      <input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
    </label>
    <button class="btn btn-danger" onclick="resetAll()"><i class="ti ti-refresh"></i>Reiniciar</button>
  </div>

</main>

<script>
const STORAGE_KEY = 'basketball_stats_v3';
const DEFAULT_PLAYERS = [
"Alonso ",
"Angel Doncic",
"Carmen",
"cDaniel ",
"Daniel",
"Diego ",
"Felix",
"Frank ",
"Johanny",
"José Daniel 👑 ⚰️",
"José Leonardo",
"Juan N",
"Luis",
"Miguel N30 👨🏼‍🍳",
"Romi"
];

let stats = [];
let meta = {};
let nextId = 1;

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-icon').className  = isLight ? 'ti ti-moon'  : 'ti ti-sun';
  document.getElementById('theme-label').textContent = isLight ? 'Oscuro' : 'Claro';
  localStorage.setItem('bball_theme', isLight ? 'light' : 'dark');
}
(function applyTheme() {
  if (localStorage.getItem('bball_theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-icon').className   = 'ti ti-moon';
    document.getElementById('theme-label').textContent = 'Oscuro';
  }
})();

function mkPlayer(nombre, num) {
  return { id: nextId++, num: num || nextId, nombre,
           faltas:0, reb:0, asist:0, blq:0, rob:0, tp:0,
           t1:0, t1a:0, t2:0, t2a:0, pts:0 };
}
function defaultStats() {
  nextId = 1;
  return DEFAULT_PLAYERS.map((n, i) => mkPlayer(n, i + 1));
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    stats = saved.stats || defaultStats();
    meta  = saved.meta  || {};
    nextId = Math.max(...stats.map(p => p.id || 0), 0) + 1;
    return true;
  } catch(e) { return false; }
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ stats, meta, savedAt: new Date().toISOString() }));
    const t = new Date();
    document.getElementById('save-text').textContent = 'Guardado ' + t.toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('save-indicator').classList.add('saved');
  } catch(e) {}
}

function applyMetaToDOM() {
  document.getElementById('meta-fecha').value          = meta.fecha      || '';
  document.getElementById('meta-lugar').value          = meta.lugar      || '';
}

function saveMeta() {
  meta.fecha    = document.getElementById('meta-fecha').value;
  meta.lugar    = document.getElementById('meta-lugar').value;
  saveToStorage();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify({stats, meta, exportedAt: new Date().toISOString()}, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = ('basketball_' + (meta.equipo||'equipo') + '_' + (meta.fecha||new Date().toISOString().slice(0,10)) + '.json').replace(/\s+/g,'_');
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('Importar reemplaza todos los datos actuales. ¿Continuar?')) { event.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.stats && Array.isArray(data.stats)) {
        stats  = data.stats;
        meta   = data.meta || {};
        nextId = Math.max(...stats.map(p => p.id || 0), 0) + 1;
        saveToStorage(); applyMetaToDOM(); buildTable();
        document.getElementById('save-text').textContent = 'Importado';
      } else { alert('JSON inválido.'); }
    } catch(err) { alert('Error al leer el archivo.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAll() {
  if (!confirm('¿Reiniciar todas las estadísticas? No se puede deshacer.')) return;
  stats = defaultStats(); meta = {};
  saveToStorage(); applyMetaToDOM(); buildTable();
  document.getElementById('save-text').textContent = 'Reiniciado';

  document.getElementById('meta-lugar').value = 'Gallinero';
  document.getElementById('save-indicator').classList.remove('saved');
}

function addPlayer() {
  const p = mkPlayer('Nuevo jugador', stats.length + 1);
  stats.push(p);
  saveToStorage();
  const tbody  = document.getElementById('players-table');
  const addRow = tbody.querySelector('.row-add');
  const tr     = createRow(p);
  tbody.insertBefore(tr, addRow);
  const ni = tr.querySelector('.name-input');
  if (ni) { ni.focus(); ni.select(); }
}

function deletePlayer(id) {
  if (stats.length <= 1) { alert('Debe haber al menos un jugador.'); return; }
  if (!confirm('¿Eliminar este jugador?')) return;
  stats.splice(stats.findIndex(p => p.id === id), 1);
  saveToStorage();
  const row = document.querySelector('[data-id="' + id + '"]');
  if (row) row.remove();
}

function setFalta(id, n) {
  const p = stats.find(x => x.id === id);
  if (!p) return;
  p.faltas = p.faltas === n ? n - 1 : n;
  saveToStorage();
  updateFaltasCell(id, p.faltas);
  updateRowClass(id, p.faltas);
}

function inc(id, key) {
  const p = stats.find(x => x.id === id);
  if (!p) return;
  p[key]++;
  saveToStorage();
  updateStatCell(id, key, p[key]);
}

function dec(id, key) {
  const p = stats.find(x => x.id === id);
  if (!p || p[key] <= 0) return;
  p[key]--;
  saveToStorage();
  updateStatCell(id, key, p[key]);
}

function setNum(id, val) {
  const n = parseInt(val);
  if (isNaN(n) || n < 0 || n > 99) return;
  const p = stats.find(x => x.id === id);
  if (p) { p.num = n; saveToStorage(); }
}

function setName(id, val) {
  const trimmed = val.trim();
  if (!trimmed) return;
  const p = stats.find(x => x.id === id);
  if (p) { p.nombre = trimmed; saveToStorage(); }
}

function updateStatCell(id, key, val) {
  const row = document.querySelector('[data-id="' + id + '"]');
  if (!row) return;
  const span = row.querySelector('[data-stat="' + key + '"]');
  if (span) span.textContent = val;
}

function updateFaltasCell(id, faltas) {
  const row = document.querySelector('[data-id="' + id + '"]');
  if (!row) return;
  row.querySelectorAll('.falta-btn').forEach((btn, i) => {
    const n = i + 1;
    btn.classList.remove('f-active', 'f-warn');
    if (faltas >= n) btn.classList.add(n === 4 ? 'f-warn' : 'f-active');
  });
}

function updateRowClass(id, faltas) {
  const row = document.querySelector('[data-id="' + id + '"]');
  if (!row) return;
  row.classList.toggle('row-foul5', faltas >= 5);
  row.classList.toggle('row-foul4', faltas === 4);
  const badge = row.querySelector('.elim-tag');
  if (badge) badge.style.display = faltas >= 5 ? 'inline' : 'none';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const _clickTimers = {};
const DBL_DELAY    = 260;

function statClick(id, key, e) {
  const k = id + '_' + key;
  clearTimeout(_clickTimers[k]);
  if (e.detail === 1) {
    _clickTimers[k] = setTimeout(() => {
      delete _clickTimers[k];
      inc(id, key);
      flashStat(id, key, 'inc');
    }, DBL_DELAY);
  } else {
    delete _clickTimers[k];
    dec(id, key);
    flashStat(id, key, 'dec');
  }
}

function shotClick(id, keyMade, keyAtt, ptsVal, e) {
  const k = id + '_' + keyMade;
  clearTimeout(_clickTimers[k]);
  if (e.detail === 1) {
    _clickTimers[k] = setTimeout(() => {
      delete _clickTimers[k];
      const p = stats.find(x => x.id === id);
      if (!p) return;
      p[keyMade]++;
      p[keyAtt]++;
      p.pts += ptsVal;
      saveToStorage();
      updateStatCell(id, keyMade, p[keyMade]);
      updateStatCell(id, keyAtt,  p[keyAtt]);
      updateStatCell(id, 'pts',   p.pts);
      flashStat(id, keyMade, 'inc');
      flashStat(id, keyAtt,  'inc');
      flashStat(id, 'pts',   'inc');
    }, DBL_DELAY);
  } else {
    delete _clickTimers[k];
    const p = stats.find(x => x.id === id);
    if (!p || p[keyMade] <= 0) return;
    p[keyMade]--;
    p.pts = Math.max(0, p.pts - ptsVal);
    saveToStorage();
    updateStatCell(id, keyMade, p[keyMade]);
    updateStatCell(id, 'pts',   p.pts);
    flashStat(id, keyMade, 'dec');
    flashStat(id, 'pts',   'dec');
  }
}

function attClick(id, keyMade, keyAtt, e) {
  const k = id + '_' + keyAtt;
  clearTimeout(_clickTimers[k]);
  if (e.detail === 1) {
    _clickTimers[k] = setTimeout(() => {
      delete _clickTimers[k];
      inc(id, keyAtt);
      flashStat(id, keyAtt, 'inc');
    }, DBL_DELAY);
  } else {
    delete _clickTimers[k];
    const p = stats.find(x => x.id === id);
    if (!p || p[keyAtt] <= p[keyMade]) return;
    dec(id, keyAtt);
    flashStat(id, keyAtt, 'dec');
  }
}

function flashStat(id, key, dir) {
  const row = document.querySelector('[data-id="' + id + '"]');
  if (!row) return;
  const span = row.querySelector('[data-stat="' + key + '"]');
  if (!span) return;
  span.classList.remove('flash-inc', 'flash-dec');
  void span.offsetWidth;
  span.classList.add(dir === 'inc' ? 'flash-inc' : 'flash-dec');
}

function mkCounter(id, key, val, accent) {
  const cls = accent ? 'cnt-val pts-accent' : 'cnt-val';
  return '<td><div class="counter">' +
    '<span class="' + cls + '" data-stat="' + key + '" onclick="statClick(' + id + ',\'' + key + '\',event)" title="Click: +1 · Doble click: -1">' + val + '</span>' +
    '</div></td>';
}

function mkShotCounter(id, keyMade, keyAtt, valMade, valAtt, ptsVal) {
  const label = ptsVal === 1 ? '+1pt' : '+2pts';
  return '<td><div class="counter" style="gap:2px">' +
    '<span class="cnt-val cnt-shot" data-stat="' + keyMade + '" onclick="shotClick(' + id + ',\'' + keyMade + '\',\'' + keyAtt + '\',' + ptsVal + ',event)" title="Click: ' + label + ' · Doble click: -' + ptsVal + 'pt">' + valMade + '</span>' +
    '<span class="shot-sep">/</span>' +
    '<span class="cnt-val cnt-att" data-stat="' + keyAtt + '" onclick="attClick(' + id + ',\'' + keyMade + '\',\'' + keyAtt + '\',event)" title="Intentos · Click: +1 · Doble click: -1">' + valAtt + '</span>' +
    '</div></td>';
}

function createRow(p) {
  const tr = document.createElement('tr');
  tr.setAttribute('data-id', p.id);
  if (p.faltas >= 5) tr.classList.add('row-foul5');
  else if (p.faltas === 4) tr.classList.add('row-foul4');

  const faltasHTML = [1,2,3,4,5].map(f => {
    let cls = '';
    if (p.faltas >= f) cls = f === 4 ? 'f-warn' : 'f-active';
    return '<button class="falta-btn ' + cls + '" onclick="setFalta(' + p.id + ',' + f + ')" aria-label="Falta ' + f + '">' + f + '</button>';
  }).join('');

  tr.innerHTML =
    '<td><input class="num-input" value="' + p.num + '" type="number" min="0" max="99" onchange="setNum(' + p.id + ',this.value)"></td>' +
    '<td class="td-name"><span class="player-name-text"><input class="name-input" value="' + escHtml(p.nombre) + '" onblur="setName(' + p.id + ',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></span>' +
    '<span class="elim-tag" style="display:' + (p.faltas >= 5 ? 'inline' : 'none') + '">OUT</span></td>' +
    '<td><div class="faltas-row">' + faltasHTML + '</div></td>' +
    mkCounter(p.id, 'reb',   p.reb)   +
    mkCounter(p.id, 'asist', p.asist) +
    mkCounter(p.id, 'blq',   p.blq)   +
    mkCounter(p.id, 'rob',   p.rob)   +
    mkCounter(p.id, 'tp',    p.tp)    +
    mkShotCounter(p.id, 't1', 't1a', p.t1||0, p.t1a||0, 1) +
    mkShotCounter(p.id, 't2', 't2a', p.t2||0, p.t2a||0, 2) +
    '<td><div class="counter"><span class="cnt-val pts-accent pts-readonly" data-stat="pts">' + p.pts + '</span></div></td>' +
    '<td><button class="del-btn" onclick="deletePlayer(' + p.id + ')" aria-label="Eliminar"><i class="ti ti-x"></i></button></td>';
  return tr;
}

function buildTable() {
  const tbody = document.getElementById('players-table');
  tbody.innerHTML = '';
  stats.forEach(p => tbody.appendChild(createRow(p)));
  // Garantizar invariante: intentos >= anotados (corrige datos legacy)
  stats.forEach(p => {
    p.t1a = Math.max(p.t1a, p.t1);
    p.t2a = Math.max(p.t2a, p.t2);
  });
  const addRow = document.createElement('tr');
  addRow.className = 'row-add';
  addRow.innerHTML = '<td colspan="12"><button class="add-btn" onclick="addPlayer()"><i class="ti ti-plus"></i>Add Player</button></td>';
  tbody.appendChild(addRow);
}

function totals() {
  return ['pts','reb','asist','blq','rob','tp','t1','t1a','t2','t2a','faltas'].reduce((acc, k) => {
    acc[k] = stats.reduce((s, p) => s + (p[k] || 0), 0);
    return acc;
  }, {});
}

function buildResumen() {
  const t = totals();
  const kpis = [
    {label:'Points',    val:t.pts,    cls:'k-green'},
    {label:'Rebounds',  val:t.reb,    cls:'k-navy'},
    {label:'Assists',   val:t.asist,  cls:'k-gold'},
    {label:'Blocks',    val:t.blq,    cls:'k-green'},
    {label:'Steals',    val:t.rob,    cls:'k-amber'},
    {label:'Turnovers', val:t.tp,     cls:'k-red'},
    {label:'Fouls',     val:t.faltas, cls:'k-red'},
  ];
  document.getElementById('kpi-row').innerHTML = kpis.map(k =>
    '<div class="kpi-card ' + k.cls + '"><div class="kpi-label">' + k.label + '</div><div class="kpi-value">' + k.val + '</div></div>'
  ).join('');

  const active = stats.filter(p => p.pts || p.reb || p.asist || p.blq || p.rob || p.faltas);
  const wrap   = document.getElementById('per-player-wrap');
  if (!active.length) { wrap.innerHTML = '<p class="empty-msg">No data recorded yet</p>'; return; }

  const pct = (m, a) => a > 0 ? Math.round((m / a) * 100) + '%' : '—';
  const pctColor = (m, a) => {
    if (!a) return 'var(--txt3)';
    const r = m / a;
    return r > 0.9 ? 'var(--green)' : r >= 0.5 ? 'var(--blue)' : r >= 0.33 ? 'var(--amber)' : 'var(--red)';
  };

  const headers = ['Player','PTS','FG','FG%','1PT','1PT%','2PT','2PT%','REB','AST','BLK','STL','TO','FL'];
  wrap.innerHTML =
    '<table class="summary-table"><thead><tr>' +
    headers.map(h => {
      if (h === 'FG')            return '<th style="color:var(--gold)">' + h + '</th>';
      if (h === 'FG%')           return '<th style="color:var(--txt3);font-style:italic">' + h + '</th>';
      if (h === '1PT' || h === '2PT')   return '<th style="color:var(--blue)">' + h + '</th>';
      if (h === '1PT%' || h === '2PT%') return '<th style="color:var(--txt3);font-style:italic">' + h + '</th>';
      return '<th>' + h + '</th>';
    }).join('') +
    '</tr></thead><tbody>' +
    active.map(p => {
      const fCls  = p.faltas >= 5 ? 'td-red' : p.faltas === 4 ? 'td-amber' : '';
      const elim  = p.faltas >= 5 ? '<span class="elim-tag">OUT</span>' : '';
      const t1warn = (p.t1a > 0 && p.t1 > p.t1a) ? ' style="color:var(--amber)"' : '';
      const t2warn = (p.t2a > 0 && p.t2 > p.t2a) ? ' style="color:var(--amber)"' : '';
      const fgm   = (p.t1||0) + (p.t2||0);
      const fga   = (p.t1a||0) + (p.t2a||0);
      return '<tr>' +
        '<td>' + escHtml(p.nombre) + elim + '</td>' +
        '<td class="td-pts-s">' + p.pts + '</td>' +
        '<td style="color:var(--gold)">' + fgm + '<span style="color:var(--txt3);font-size:11px">/' + fga + '</span></td>' +
        '<td style="color:' + pctColor(fgm, fga) + ';font-style:italic">' + pct(fgm, fga) + '</td>' +
        '<td style="color:var(--blue)"' + t1warn + '>' + (p.t1||0) + '<span style="color:var(--txt3);font-size:11px">/' + (p.t1a||0) + '</span></td>' +
        '<td style="color:' + pctColor(p.t1||0, p.t1a||0) + ';font-style:italic">' + pct(p.t1||0, p.t1a||0) + '</td>' +
        '<td style="color:var(--blue)"' + t2warn + '>' + (p.t2||0) + '<span style="color:var(--txt3);font-size:11px">/' + (p.t2a||0) + '</span></td>' +
        '<td style="color:' + pctColor(p.t2||0, p.t2a||0) + ';font-style:italic">' + pct(p.t2||0, p.t2a||0) + '</td>' +
        '<td>' + p.reb + '</td><td>' + p.asist + '</td><td>' + p.blq + '</td><td>' + p.rob + '</td>' +
        '<td>' + p.tp + '</td>' +
        '<td class="' + fCls + '">' + p.faltas + '</td>' +
        '</tr>';
    }).join('') +
    '</tbody></table>';
}

function buildLideres() {
  const cats = [
    {key:'pts',   label:'Points Leaders'},
    {key:'reb',   label:'Rebounds Leaders'},
    {key:'asist', label:'Assists Leaders'},
    {key:'blq',   label:'Blocks Leaders'},
    {key:'rob',   label:'Steals Leaders'},
  ];
  let html = '';
  cats.forEach(cat => {
    const sorted = [...stats].filter(p => p[cat.key] > 0).sort((a,b) => b[cat.key] - a[cat.key]).slice(0, 5);
    if (!sorted.length) return;
    const max = sorted[0][cat.key];
    html += '<div class="cat-block"><div class="cat-head">' + cat.label + '</div>' +
      sorted.map((p, i) => {
        const pct  = max > 0 ? Math.round((p[cat.key] / max) * 100) : 0;
        const isTop = i === 0;
        return '<div class="lider-row">' +
          '<span class="lider-rank' + (isTop ? ' top' : '') + '">' + (i+1) + '</span>' +
          '<span class="lider-name">' + escHtml(p.nombre) + '</span>' +
          '<div class="lider-bar-wrap"><div class="lider-bar' + (isTop ? ' top' : '') + '" style="width:' + pct + '%"></div></div>' +
          '<span class="lider-val">' + p[cat.key] + '</span>' +
          '</div>';
      }).join('') + '</div>';
  });
  document.getElementById('lideres-wrap').innerHTML = html || '<p class="empty-msg">No data recorded yet</p>';
}

function showTab(name) {
  ['registro','resumen','lideres'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    t.classList.toggle('active', ['registro','resumen','lideres'][i] === name);
  });
  if (name === 'resumen') buildResumen();
  if (name === 'lideres') buildLideres();
}

if (!loadFromStorage()) stats = defaultStats();
applyMetaToDOM();
buildTable();
if (localStorage.getItem(STORAGE_KEY)) {
  document.getElementById('save-text').textContent = 'Cargado';
  document.getElementById('save-indicator').classList.add('saved');
}
</script>
</body>
</html>
